{% extends "base.html" %}
{% block title %}Edit Contact{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit Contact</h1>
  <a href="{{ url_for('index') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card" style="max-width:560px;">
  <p style="color:var(--muted); font-size:0.85rem; margin-bottom:1.4rem;">
    Editing: <strong style="color:var(--text)">{{ contact.name }}</strong>
    &nbsp;<span class="badge">ID {{ contact.id }}</span>
  </p>

  <form method="POST"
        action="{{ url_for('edit_contact', contact_id=contact.id) }}">

    <div class="form-group">
      <label for="name">Full Name *</label>
      <input
        type="text"
        id="name"
        name="name"
        value="{{ form_data.get('name', contact.name) }}"
        required
      />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number *</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        value="{{ form_data.get('phone', contact.phone) }}"
        required
      />
    </div>

    <div class="form-group">
      <label for="email">Email Address *</label>
      <input
        type="email"
        id="email"
        name="email"
        value="{{ form_data.get('email', contact.email) }}"
        required
      />
    </div>

    <div class="form-group">
      <label for="address">Address <span style="color:var(--muted); font-weight:400;">(optional)</span></label>
      <input
        type="text"
        id="address"
        name="address"
        value="{{ form_data.get('address', contact.address) }}"
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">✅ Update Contact</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
