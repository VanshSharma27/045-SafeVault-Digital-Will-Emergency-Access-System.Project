{% extends "base.html" %}
{% block title %}Add Contact{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Add New Contact</h1>
  <a href="{{ url_for('index') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card" style="max-width:560px;">
  <form method="POST" action="{{ url_for('add_contact') }}">

    <div class="form-group">
      <label for="name">Full Name *</label>
      <input
        type="text"
        id="name"
        name="name"
        value="{{ form_data.get('name', '') }}"
        placeholder="e.g. Alice Johnson"
        required
      />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number *</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        value="{{ form_data.get('phone', '') }}"
        placeholder="e.g. 9876543210"
        required
      />
    </div>

    <div class="form-group">
      <label for="email">Email Address *</label>
      <input
        type="email"
        id="email"
        name="email"
        value="{{ form_data.get('email', '') }}"
        placeholder="e.g. alice@example.com"
        required
      />
    </div>

    <div class="form-group">
      <label for="address">Address <span style="color:var(--muted); font-weight:400;">(optional)</span></label>
      <input
        type="text"
        id="address"
        name="address"
        value="{{ form_data.get('address', '') }}"
        placeholder="e.g. 12 Elm Street, Delhi"
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 Save Contact</button>
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
