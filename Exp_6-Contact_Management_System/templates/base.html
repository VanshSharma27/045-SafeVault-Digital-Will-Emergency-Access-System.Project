<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Contacts{% endblock %} | ContactVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161921;
      --surface2:  #1e2130;
      --border:    #2a2f45;
      --accent:    #6ee7b7;   /* mint green */
      --accent2:   #38bdf8;   /* sky blue */
      --danger:    #f87171;
      --warn:      #fbbf24;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    12px;
      --shadow:    0 4px 24px rgba(0,0,0,0.5);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ──────────────────────────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
      text-decoration: none;
    }

    .nav-brand span { color: var(--text); }

    .nav-links { display: flex; gap: 0.5rem; align-items: center; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.18s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0f14;
    }
    .btn-primary:hover { background: #a7f3d0; transform: translateY(-1px); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    .btn-edit {
      background: transparent;
      color: var(--accent2);
      border: 1px solid var(--accent2);
    }
    .btn-edit:hover { background: var(--accent2); color: #fff; }

    /* ── Flash Messages ───────────────────────────── */
    .flash-container {
      max-width: 960px;
      margin: 1.5rem auto 0;
      padding: 0 1.5rem;
      width: 100%;
    }

    .flash {
      padding: 0.75rem 1.1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 0.6rem;
      font-weight: 500;
    }
    .flash.success { background: #052e16; border: 1px solid #16a34a; color: #86efac; }
    .flash.error   { background: #2d0a0a; border: 1px solid #dc2626; color: #fca5a5; }

    /* ── Main ─────────────────────────────────────── */
    main {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      flex: 1;
      width: 100%;
    }

    /* ── Page header ──────────────────────────────── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.8rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem;
      box-shadow: var(--shadow);
    }

    /* ── Table ────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead tr {
      background: var(--surface2);
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.07em;
    }

    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: var(--surface2); }

    .actions { display: flex; gap: 0.5rem; }

    /* ── Form ─────────────────────────────────────── */
    .form-group { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.825rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    /* ── Empty state ──────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty-state p { margin-bottom: 1.2rem; }

    /* ── Search bar ───────────────────────────────── */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      flex: 1;
      min-width: 220px;
      max-width: 360px;
    }

    .search-bar input {
      flex: 1;
      padding: 0.55rem 0.9rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent); }

    /* ── Footer ───────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    /* ── Badge ────────────────────────────────────── */
    .badge {
      display: inline-block;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
    }
  </style>
</head>
<body>

<nav>
  <a href="{{ url_for('index') }}" class="nav-brand">Contact<span>Vault</span></a>
  <div class="nav-links">
    <a href="{{ url_for('index') }}" class="btn btn-secondary">🏠 Home</a>
    <a href="{{ url_for('add_contact') }}" class="btn btn-primary">＋ Add Contact</a>
  </div>
</nav>

<!-- Flash messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  ContactVault &mdash; Contact Management System &copy; 2026
</footer>

</body>
</html>
