<!-- ============================================================
     Project Title : Event Management Website
     File          : templates/admin_edit.html  (Edit Event)
     ============================================================ -->
{% extends "base.html" %}
{% block title %}Edit Event — EventHub{% endblock %}

{% block content %}

<section class="page-header">
  <h1>✏️ Edit Event</h1>
  <p>Update the details for <strong>{{ event['name'] }}</strong></p>
</section>

<section class="section">
  <div class="admin-card">
    <form method="POST" action="{{ url_for('admin_edit', event_id=event['id']) }}">
      <div class="form-row">
        <div class="form-group">
          <label>Event Name *</label>
          <input type="text" name="name" value="{{ event['name'] }}" required />
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" name="category" value="{{ event['category'] }}" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date *</label>
          <input type="date" name="date" value="{{ event['date'] }}" required />
        </div>
        <div class="form-group">
          <label>Time *</label>
          <input type="text" name="time" value="{{ event['time'] }}" required />
        </div>
      </div>
      <div class="form-group">
        <label>Venue *</label>
        <input type="text" name="venue" value="{{ event['venue'] }}" required />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3">{{ event['description'] }}</textarea>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" name="image_url" value="{{ event['image_url'] }}" />
      </div>
      <div style="display:flex;gap:1rem;">
        <button type="submit" class="btn btn-primary">💾 Save Changes</button>
        <a href="{{ url_for('admin') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</section>

{% endblock %}
