{% extends "base.html" %}
{% block title %}Admin Login — EventHub{% endblock %}

{% block content %}
<section class="form-section section" style="max-width:400px">
  <h2 style="text-align:center;margin-bottom:1.5rem;">🔐 Admin Login</h2>
  <form method="POST" action="{{ url_for('admin_login') }}">
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter admin password" required />
    </div>
    <button type="submit" class="btn btn-primary btn-full">Login</button>
  </form>
  <p style="text-align:center;margin-top:1rem;color:#888;font-size:.85rem;">
    Default password: <code>admin123</code>
  </p>
</section>
{% endblock %}
